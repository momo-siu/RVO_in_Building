spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/rvo
spring.datasource.username=root
spring.datasource.password=server.admin

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

server.port=8888

# 项目根目录：使用相对路径 ${user.dir}/source/，确保跨环境兼容
path.projectPath = ${user.dir}/source

path.venvPath=D:/Anaconda3/envs/myenv/python.exe

frontIP=127.0.0.1:8888

# C++模拟器程序路径（请根据实际构建结果调整）
path.cppRvoSimulatorPath=${user.dir}/cpp-rvo-simulator/build/rvo_simulator.exe